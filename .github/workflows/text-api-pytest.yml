name: Text API Pytest

on:
  push:
    paths:
      - "04-projects/text-api/**"
      - ".github/workflows/text-api-pytest.yml"
  pull_request:
    paths:
      - "04-projects/text-api/**"
      - ".github/workflows/text-api-pytest.yml"
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: 04-projects/text-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest

